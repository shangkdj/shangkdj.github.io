class="line">244</span><br><span class="line">245</span><br><span class="line">246</span><br><span class="line">247</span><br><span class="line">248</span><br><span class="line">249</span><br><span class="line">250</span><br><span class="line">251</span><br><span class="line">252</span><br><span class="line">253</span><br><span class="line">254</span><br><span class="line">255</span><br><span class="line">256</span><br><span class="line">257</span><br></pre></td><td class="code"><pre><span class="line">#/usr/bin/env python</span><br><span class="line"># -*- coding=utf-8 -*-</span><br><span class="line"></span><br><span class="line">import os</span><br><span class="line">import time</span><br><span class="line">import shutil</span><br><span class="line">import random</span><br><span class="line">import sys</span><br><span class="line">import platform</span><br><span class="line">import traceback</span><br><span class="line">import commands</span><br><span class="line"></span><br><span class="line">#add</span><br><span class="line">#counts 目录下增加文件的数量</span><br><span class="line">#ddir 目标目录</span><br><span class="line">def nsfile(counts,ddir,size):</span><br><span class="line">    &apos;&apos;&apos;The number of new expected documents&apos;&apos;&apos;</span><br><span class="line"></span><br><span class="line">#生成文件</span><br><span class="line">    for i in range(1,counts+1):</span><br><span class="line"></span><br><span class="line">        localTime = time.strftime(&quot;%Y%m%d%H%M%S&quot;,time.localtime())</span><br><span class="line"></span><br><span class="line">        #print localtime</span><br><span class="line">        filename = str(ddir)+&quot;/&quot;+localTime+&quot;_&quot;+str(i)+&quot;.txt&quot;</span><br><span class="line"></span><br><span class="line">        #a:以追加模式打开（必要时可以创建）append;b:表示二进制</span><br><span class="line">        f = open(filename,&apos;ab&apos;)</span><br><span class="line">    </span><br><span class="line">        f.write(os.urandom(size))</span><br><span class="line">        f.close()</span><br><span class="line"></span><br><span class="line">        #输出第几个文件和对应的文件名称</span><br><span class="line">        print &quot;file&quot;+&quot; &quot;+str(i)+&quot;:&quot;+str(localTime)+&quot;.txt&quot;</span><br><span class="line">    print &quot;ALL MAKE OVER&quot;</span><br><span class="line">  </span><br><span class="line">#rm</span><br><span class="line">#r需要删除的目录</span><br><span class="line">def rm_dir(rdir):</span><br><span class="line">    &apos;&apos;&apos;rm file&apos;&apos;&apos;</span><br><span class="line">    if os.path.exists(rdir):</span><br><span class="line">  </span><br><span class="line">        shutil.rmtree(rdir)</span><br><span class="line">        print &quot;remove --%s ok&quot;%rdir</span><br><span class="line">    else:</span><br><span class="line">        print &quot;%s is not exists&quot;%rdir</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">#cat</span><br><span class="line">def cat_file(catdir):</span><br><span class="line">    &apos;&apos;&apos;cat file number&apos;&apos;&apos;</span><br><span class="line"></span><br><span class="line">    filecount=0</span><br><span class="line"></span><br><span class="line">    for root,dir,files in os.walk(catdir):</span><br><span class="line">        filecount+=len(files)</span><br><span class="line"></span><br><span class="line">    return filecount</span><br><span class="line"></span><br><span class="line">#change</span><br><span class="line">#chdir需要更改文件的上级目录</span><br><span class="line">def chfile(chdir):</span><br><span class="line">    &quot;change file text&quot;</span><br><span class="line"></span><br><span class="line">    for root,dirs,files in os.walk(chdir):</span><br><span class="line">        for file in files:</span><br><span class="line"></span><br><span class="line">            chfile=os.path.join(root,file)</span><br><span class="line"></span><br><span class="line">#更改前文件大小</span><br><span class="line">            bfsize=get_fsize(chfile)</span><br><span class="line">      </span><br><span class="line">#w：可以覆盖原有内容</span><br><span class="line">        f = open(chfile,&apos;ab&apos;)</span><br><span class="line">        f.write(os.urandom(100*100))</span><br><span class="line">        f.close()</span><br><span class="line">      </span><br><span class="line">#更改后文件大小</span><br><span class="line">        afsize=get_fsize(chfile)</span><br><span class="line"></span><br><span class="line">        print &quot;position: %s  size %d --&gt;  %d kb&quot;%(chfile,bfsize,afsize)</span><br><span class="line">    </span><br><span class="line">        print &quot;Change Over&quot;</span><br><span class="line"></span><br><span class="line">#察看目标文件的大G小</span><br><span class="line"></span><br><span class="line">def get_fsize(path):</span><br><span class="line">    count = 0</span><br><span class="line">    for dirname in os.listdir(path):</span><br><span class="line">        tmp_dir = os.path.join(path,dirname)</span><br><span class="line">        if (os.path.isdir(tmp_dir)):</span><br><span class="line">            for r,ds,files in os.walk(tmp_dir):</span><br><span class="line">                for f1 in files:</span><br><span class="line">                    size = os.path.getsize(os.path.join(r,f1)) </span><br><span class="line">                    count += size</span><br><span class="line">    </span><br><span class="line">    return count </span><br><span class="line">          </span><br><span class="line"></span><br><span class="line"> #判断目录是否存在</span><br><span class="line">def check_dir(cdir):</span><br><span class="line">    if not os.path.exists(cdir):</span><br><span class="line">        print(&quot;dir is not exists&quot;)</span><br><span class="line">        os.makedirs(cdir) </span><br><span class="line">        print(&quot;%s is created&quot;%cdir)</span><br><span class="line">       </span><br><span class="line"></span><br><span class="line">###
